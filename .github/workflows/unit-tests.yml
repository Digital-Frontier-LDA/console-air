name: unit-tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Use Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Pin npm to match packageManager field
        run: npm install --global npm@11.11.0

      - name: Install dependencies
        run: npm ci

      - name: Run package unit tests
        run: npm run test -w ./packages --if-present

      - name: Run deploy-web unit tests
        run: npm run test:unit -w apps/deploy-web

  type-check:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Use Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Pin npm to match packageManager field
        run: npm install --global npm@11.11.0

      - name: Install dependencies
        run: npm ci

      - name: Type-check deploy-web
        run: npm run type-check -w apps/deploy-web
